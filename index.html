<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebAR Multitarget Dinámico</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      #ui {
        position: fixed; z-index: 1000; bottom: 20px; left: 50%;
        transform: translateX(-50%); background: rgba(0,0,0,0.7);
        color: white; padding: 10px 20px; border-radius: 20px;
        font-family: sans-serif; pointer-events: none;
      }
    </style>
  </head>
  <body>

    <div id="ui">Apunta a una imagen</div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; maxTrack: 2; uiScanning: #ui;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets id="assets-container">
        </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      </a-scene>

    <script>
      const sceneEl = document.querySelector('a-scene');
      const assetsContainer = document.querySelector('#assets-container');
      const TOTAL_TARGETS = 7; // Puedes dejarlo en 26 aunque solo uses 10

      // 1. Generar los contenedores de AR automáticamente
      for (let i = 0; i < TOTAL_TARGETS; i++) {
        const entity = document.createElement('a-entity');
        entity.setAttribute('mindar-image-target', `targetIndex: ${i}`);
        
        // Creamos el plano donde se verá el video
        const videoPlane = document.createElement('a-video');
        videoPlane.setAttribute('id', `render-v${i}`);
        videoPlane.setAttribute('width', '1');
        videoPlane.setAttribute('height', '0.6'); // Ajusta según tus videos
        videoPlane.setAttribute('position', '0 0 0');
        
        entity.appendChild(videoPlane);
        sceneEl.appendChild(entity);
      }

      // 2. Lógica de carga y descarga dinámica
      sceneEl.addEventListener("targetFound", event => {
        const i = event.detail.targetIndex;
        console.log("Detectado target:", i);

        // Crear el elemento de video real
        let v = document.createElement('video');
        v.id = `src-v${i}`;
        v.src = `./videos/v${i}.mp4`; // Asegúrate que la ruta sea correcta
        v.setAttribute('loop', 'true');
        v.setAttribute('crossorigin', 'anonymous');
        v.setAttribute('playsinline', '');
        v.setAttribute('webkit-playsinline', '');
        
        assetsContainer.appendChild(v);

        // Vincular el video al plano de AR
        const targetPlane = document.querySelector(`#render-v${i}`);
        targetPlane.setAttribute('src', `#src-v${i}`);

        // Intentar reproducir
        v.play().catch(err => console.warn("Esperando interacción para audio"));
      });

      sceneEl.addEventListener("targetLost", event => {
        const i = event.detail.targetIndex;
        const v = document.querySelector(`#src-v${i}`);
        
        if (v) {
          v.pause();
          v.src = ""; // Liberar memoria RAM inmediatamente
          v.remove(); // Eliminar del DOM
        }
      });
    </script>
  </body>
</html>
