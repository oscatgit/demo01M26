<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnóstico WebAR</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      #overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.9); z-index: 2000;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        color: white; font-family: sans-serif;
      }
      #start-btn { padding: 15px 30px; background: #2196F3; color: white; border: none; border-radius: 10px; font-weight: bold;}
    </style>
  </head>
  <body>

    <div id="overlay">
      <button id="start-btn">HAY QUE HACER CLIC AQUÍ</button>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: false;" 
      embedded color-space="sRGB" renderer="colorManagement: true;" vr-mode-ui="enabled: false">
      
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-plane id="test-plane" width="1" height="0.6" position="0 0 0" material="shader: flat; color: red;"></a-plane>
      </a-entity>
    </a-scene>

    <script>
      const sceneEl = document.querySelector('a-scene');
      const startBtn = document.querySelector('#start-btn');
      const testPlane = document.querySelector('#test-plane');

      startBtn.addEventListener('click', () => {
        document.querySelector('#overlay').style.display = 'none';
        sceneEl.systems["mindar-image-system"].start();

        // 1. Crear el video de prueba (URL de Wikimedia estable)
        const v = document.createElement('video');
        v.src = "https://upload.wikimedia.org/wikipedia/commons/transcoded/c/c0/Big_Buck_Bunny_4K.webm/Big_Buck_Bunny_4K.webm.480p.vp9.webm";
        v.crossOrigin = "anonymous";
        v.loop = true;
        v.muted = true;
        v.playsInline = true;
        v.play();

        // 2. Aplicar al plano cuando el video esté listo
        v.addEventListener('playing', () => {
           console.log("Video jugando");
           testPlane.setAttribute('material', 'src', v);
           testPlane.setAttribute('material', 'color', 'white'); // Quitamos el rojo
        });
      });

      // 3. Forzar actualización de textura (Tick manual)
      AFRAME.registerComponent('video-handler', {
        tick: function () {
          const mesh = testPlane.getObject3D('mesh');
          if (mesh && mesh.material.map) {
            mesh.material.map.needsUpdate = true;
          }
        }
      });
      testPlane.setAttribute('video-handler', '');
    </script>
  </body>
</html>
