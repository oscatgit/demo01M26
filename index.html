<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WebAR - 7 Videos con Sonido</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
      #overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #000; z-index: 10000; display: flex;
        flex-direction: column; align-items: center; justify-content: center;
        color: white; font-family: sans-serif; text-align: center; padding: 20px;
      }
      #start-btn {
        padding: 20px 40px; background: #4CAF50; color: white;
        border: none; border-radius: 50px; font-weight: bold; font-size: 20px; cursor: pointer;
      }
      .mindar-ui-overlay { display: none !important; }
      canvas { width: 100vw !important; height: 100vh !important; position: fixed !important; top: 0 !important; left: 0 !important; }
    </style>
  </head>
  <body>

    <div id="overlay">
      <h2>Experiencia AR Interactiva</h2>
      <p>Apunta a los marcadores para ver los videos con sonido</p>
      <button id="start-btn">COMENZAR</button>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiScanning: no;" 
      embedded vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="v0" src="./videos/v0.mp4" loop="true" crossorigin="anonymous" playsinline webkit-playsinline muted></video>
        <video id="v1" src="./videos/v1.mp4" loop="true" crossorigin="anonymous" playsinline webkit-playsinline muted></video>
        <video id="v2" src="./videos/v2.mp4" loop="true" crossorigin="anonymous" playsinline webkit-playsinline muted></video>
        <video id="v3" src="./videos/v3.mp4" loop="true" crossorigin="anonymous" playsinline webkit-playsinline muted></video>
        <video id="v4" src="./videos/v4.mp4" loop="true" crossorigin="anonymous" playsinline webkit-playsinline muted></video>
        <video id="v5" src="./videos/v5.mp4" loop="true" crossorigin="anonymous" playsinline webkit-playsinline muted></video>
        <video id="v6" src="./videos/v6.mp4" loop="true" crossorigin="anonymous" playsinline webkit-playsinline muted></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target0" mindar-image-target="targetIndex: 0"><a-plane id="p0" width="1.5" height="1.05" material="shader: flat; src: #v0"></a-plane></a-entity>
      <a-entity id="target1" mindar-image-target="targetIndex: 1"><a-plane id="p1" width="1.5" height="0.9" material="shader: flat; src: #v1"></a-plane></a-entity>
      <a-entity id="target2" mindar-image-target="targetIndex: 2"><a-plane id="p2" width="1.125" height="1.5" material="shader: flat; src: #v2"></a-plane></a-entity>
      <a-entity id="target3" mindar-image-target="targetIndex: 3"><a-plane id="p3" width="1.125" height="1.5" material="shader: flat; src: #v3"></a-plane></a-entity>
      <a-entity id="target4" mindar-image-target="targetIndex: 4"><a-plane id="p4" width="1.125" height="1.5" material="shader: flat; src: #v4"></a-plane></a-entity>
      <a-entity id="target5" mindar-image-target="targetIndex: 5"><a-plane id="p5" width="1.125" height="1.5" material="shader: flat; src: #v5"></a-plane></a-entity>
      <a-entity id="target6" mindar-image-target="targetIndex: 6"><a-plane id="p6" width="1.125" height="1.5" material="shader: flat; src: #v6"></a-plane></a-entity>

    </a-scene>

    <script>
      const btn = document.getElementById('start-btn');
      const videos = [];
      for(let i=0; i<7; i++) { videos.push(document.getElementById(`v${i}`)); }

      // Componente para refrescar textura (evita cuadros negros)
      AFRAME.registerComponent('video-refresh', {
        tick: function () {
          const mesh = this.el.getObject3D('mesh');
          if (mesh && mesh.material && mesh.material.map) {
            mesh.material.map.needsUpdate = true;
          }
        }
      });

      btn.addEventListener('click', () => {
        document.getElementById('overlay').style.display = 'none';
        document.querySelector('a-scene').systems["mindar-image-system"].start();

        videos.forEach((v, index) => {
          // ACTIVAR SONIDO: Quitamos el mute tras la interacción del usuario
          v.muted = false; 
          // Pre-reproducción silenciosa para preparar el buffer
          v.play().then(() => {
            v.pause();
            v.currentTime = 0;
          });
          // Aplicar el refrescador a cada plano
          document.getElementById(`p${index}`).setAttribute('video-refresh', '');
        });
      });

      // Control de Play/Pause dinámico
      for(let i=0; i<7; i++) {
        const target = document.getElementById(`target${i}`);
        target.addEventListener("targetFound", () => { videos[i].play(); });
        target.addEventListener("targetLost", () => { videos[i].pause(); });
      }
    </script>
  </body>
</html>
