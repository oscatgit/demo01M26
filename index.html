<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebAR Fix - Conexión Directa</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      #ui-scanning {
        position: fixed; z-index: 1000; bottom: 20px; left: 50%;
        transform: translateX(-50%); background: rgba(0,0,0,0.8);
        color: white; padding: 12px 24px; border-radius: 30px;
        font-family: sans-serif;
      }
    </style>
  </head>
  <body>

    <div id="ui-scanning">Escaneando...</div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; maxTrack: 2; uiScanning: #ui-scanning;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    </a-scene>

    <script>
      const sceneEl = document.querySelector('a-scene');
      const TOTAL_TARGETS = 26; 

      for (let i = 0; i < TOTAL_TARGETS; i++) {
        const entity = document.createElement('a-entity');
        entity.setAttribute('mindar-image-target', `targetIndex: ${i}`);
        
        // Usamos un a-plane básico en lugar de a-video para tener control total
        const videoPlane = document.createElement('a-plane');
        videoPlane.setAttribute('id', `plane-v${i}`);
        videoPlane.setAttribute('width', '1');
        videoPlane.setAttribute('height', '0.6');
        videoPlane.setAttribute('position', '0 0 0');
        videoPlane.setAttribute('material', 'shader: flat; side: double');
        
        entity.appendChild(videoPlane);
        sceneEl.appendChild(entity);
      }

      sceneEl.addEventListener("targetFound", event => {
        const i = event.detail.targetIndex;
        const plane = document.querySelector(`#plane-v${i}`);

        // Crear el video "invisible" en memoria
        const v = document.createElement('video');
        v.src = `https://www.w3schools.com/html/mov_bbb.mp4`;
        v.muted = true;
        v.loop = true;
        v.playsInline = true;
        v.crossOrigin = "anonymous";

        v.oncanplay = () => {
          v.play();
          // LA CLAVE: Asignar el objeto de video directamente al mapa de la textura
          plane.setAttribute('material', 'src', v);
        };
      });

      sceneEl.addEventListener("targetLost", event => {
        const i = event.detail.targetIndex;
        const plane = document.querySelector(`#plane-v${i}`);
        
        // Detener el video y limpiar el material
        const videoSrc = plane.getAttribute('material').src;
        if (videoSrc && typeof videoSrc.pause === 'function') {
          videoSrc.pause();
          videoSrc.src = "";
          videoSrc.load();
        }
        plane.setAttribute('material', 'src', '');
      });
    </script>
  </body>
</html>
